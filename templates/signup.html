<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Doable</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">

<!-- 🌙 Theme Toggle -->
<button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">🌙</button>

<div class="auth-card">
    <span class="auth-logo">Doable.</span>

    <h2>Create account</h2>
    <p class="subtitle">Start organizing your tasks today</p>

    <!-- Error message if signup fails -->
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="choose a username" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary">Create account</button>
    </form>

    <div class="auth-footer">
        Already have an account? <a href="/login">Sign in</a>
    </div>
</div>

<script>
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        document.querySelector('.theme-toggle').textContent = theme === 'dark' ? '☀️' : '🌙';
        localStorage.setItem('theme', theme);
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        applyTheme(current === 'dark' ? 'light' : 'dark');
    }

    const savedTheme = localStorage.getItem('theme') || 'light';
    applyTheme(savedTheme);
</script>

</body>
</html>
